# Jekyll Configuration for GitHub Pages
# SailPoint ISC Labs

# Site Settings
title: "SailPoint ISC Labs"
tagline: "Zero to Professional: Complete Hands-On Learning Path"
description: "Comprehensive hands-on learning platform for SailPoint Identity Security Cloud certification. 80+ labs, 10 units, professional and engineer certification tracks."
url: "" # Will be set by GitHub Pages
baseurl: "" # Will be set by GitHub Pages when deployed

# Author Information
author: "TedxHarry"
author-email: ""

# Theme
theme: jekyll-theme-cayman
# Alternative themes: jekyll-theme-slate, jekyll-theme-architect, jekyll-theme-midnight, jekyll-theme-minimal

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Build Settings
markdown: kramdown
highlighter: rouge
exclude:
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - node_modules
  - LICENSE
  - CHANGELOG.md
  - "*.psd"
  - "*.sketch"

# SEO
google_site_verification: ""
twitter: ""
github: "TedxHarry"

# Collections (optional - for organizing labs)
collections_dir: .
collections:
  UNIT-1-FUNDAMENTALS:
    output: true
  UNIT-2-ENTRA-ID-SETUP:
    output: true
  UNIT-3-IDENTITY-PROFILES-SOURCES:
    output: true
  UNIT-4-AGGREGATION-CORRELATION:
    output: true
  UNIT-5-ACCESS-MODELING:
    output: true
  UNIT-6-PROVISIONING-DEPROVISIONING:
    output: true
  UNIT-7-GOVERNANCE-CERTIFICATION:
    output: true

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Performance
future: false
show_drafts: false

# Keep .nojekyll to avoid processing non-Jekyll files
keep_files:
  - .nojekyll
