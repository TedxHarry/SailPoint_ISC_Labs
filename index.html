<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SailPoint Identity Cloud (ISC) - Comprehensive Learning Labs & Certification Guide">
    <title>SailPoint ISC Labs - Master Identity Cloud</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3588/3588341.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #1c2128;
            --bg-hover: #21262d;
            --border-color: #30363d;
            --accent: #388bfd;
            --accent-light: #58a6ff;
            --accent-glow: rgba(56, 139, 253, 0.2);
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --green: #3fb950;
            --yellow: #d29922;
            --red: #f85149;
            --purple: #bc8cff;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-primary: #ffffff;
                --bg-secondary: #f6f8fa;
                --bg-tertiary: #f0f2f5;
                --bg-hover: #eaeef2;
                --border-color: #d0d7de;
                --accent: #0969da;
                --accent-light: #1f6feb;
                --accent-glow: rgba(9, 105, 218, 0.1);
                --text-primary: #24292f;
                --text-secondary: #57606a;
                --text-muted: #6e7681;
            }
        }

        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        a {
            color: var(--accent-light);
            text-decoration: none;
            transition: color 0.2s;
        }

        a:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        .docsify-container {
            font-size: 16px;
        }

        .sidebar-toggle {
            background: var(--bg-secondary) !important;
            border-right: 1px solid var(--border-color) !important;
        }

        .sidebar {
            background: var(--bg-secondary) !important;
            border-right: 1px solid var(--border-color) !important;
        }

        .sidebar ul li a {
            color: var(--text-secondary) !important;
            transition: all 0.2s;
        }

        .sidebar ul li a:hover {
            color: var(--accent-light) !important;
            background: var(--bg-hover) !important;
        }

        .sidebar ul li.active > a {
            color: var(--accent-light) !important;
            background: var(--accent-glow) !important;
            border-right: 2px solid var(--accent) !important;
        }

        .sidebar ul li.active > a::before {
            content: '▸ ';
            color: var(--accent);
            font-weight: bold;
        }

        .markdown-section {
            padding: 2.5rem 3rem;
            max-width: 840px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .markdown-section {
                padding: 1.5rem;
            }
        }

        .markdown-section h1 {
            color: var(--accent-light);
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--accent-glow);
        }

        .markdown-section h1 + em {
            color: var(--text-secondary);
            font-size: 1.1rem;
            display: block;
            margin-bottom: 1.5rem;
        }

        .markdown-section h2 {
            color: var(--accent-light);
            font-size: 1.8rem;
            margin: 1.5rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .markdown-section h3 {
            color: var(--text-primary);
            font-size: 1.3rem;
            margin: 1.2rem 0 0.5rem;
        }

        .markdown-section h4,
        .markdown-section h5,
        .markdown-section h6 {
            color: var(--text-primary);
            margin: 1rem 0 0.5rem;
        }

        .markdown-section p {
            color: var(--text-secondary);
            margin: 0.75rem 0;
            line-height: 1.85;
        }

        .markdown-section ul,
        .markdown-section ol {
            margin: 0.75rem 0;
            padding-left: 2rem;
        }

        .markdown-section li {
            color: var(--text-secondary);
            margin: 0.5rem 0;
        }

        .markdown-section code {
            background: var(--bg-tertiary);
            color: var(--red);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9em;
            font-family: 'Courier New', Courier, monospace;
        }

        .markdown-section pre {
            background: var(--bg-tertiary) !important;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 1rem;
            overflow-x: auto;
        }

        .markdown-section pre code {
            color: var(--text-secondary);
            background: none;
            padding: 0;
        }

        .markdown-section blockquote {
            border-left: 4px solid var(--accent);
            background: var(--bg-tertiary);
            padding: 0.75rem 1rem;
            margin: 1rem 0;
            border-radius: 4px;
            color: var(--text-secondary);
        }

        .markdown-section blockquote p {
            margin: 0;
        }

        .markdown-section table {
            border-collapse: collapse;
            width: 100%;
            margin: 1rem 0;
        }

        .markdown-section table th {
            background: var(--bg-tertiary);
            color: var(--accent-light);
            padding: 0.75rem;
            text-align: left;
            border: 1px solid var(--border-color);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .markdown-section table td {
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .markdown-section table tr:hover {
            background: var(--bg-hover);
        }

        .markdown-section strong {
            color: var(--text-primary);
        }

        .markdown-section em {
            color: var(--text-secondary);
        }

        .markdown-section img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            margin: 1rem 0;
        }

        .cover {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%) !important;
        }

        .cover-main {
            padding: 4rem 2rem;
        }

        .cover h1 {
            color: var(--accent-light);
            font-size: 3rem;
            margin: 0 0 1rem;
            font-weight: 700;
        }

        .cover h2 {
            color: var(--text-secondary);
            font-size: 1.5rem;
            margin: 0 0 2rem;
            font-weight: 400;
        }

        .cover .cover-main > p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .cover .cover-main > p em {
            color: var(--accent-light);
        }

        .cover a {
            display: inline-block;
            margin: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: var(--accent);
            color: white !important;
            border-radius: 6px;
            transition: background 0.2s;
            text-decoration: none;
        }

        .cover a:hover {
            background: var(--accent-light);
            text-decoration: none;
        }

        .progress {
            background: var(--accent) !important;
            height: 3px !important;
        }

        .search {
            margin: 1rem 0;
        }

        .search input {
            background: var(--bg-tertiary) !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-primary) !important;
            padding: 0.5rem 0.75rem !important;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .search input:focus {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 2px var(--accent-glow) !important;
        }

        .search input::placeholder {
            color: var(--text-muted) !important;
        }

        .search .results-panel {
            background: var(--bg-tertiary) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 4px;
        }

        .search .results-panel h2 {
            color: var(--accent-light) !important;
            border-bottom: 1px solid var(--border-color) !important;
        }

        .search .results-panel > ul > li > a {
            color: var(--accent-light) !important;
        }

        .search .results-panel > ul > li > a:hover {
            background: var(--bg-hover) !important;
        }

        .article-nav {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
        }

        .article-nav a {
            color: var(--accent-light);
            flex: 1;
            padding: 0.5rem;
        }

        .article-nav a:nth-child(1) {
            text-align: left;
        }

        .article-nav a:nth-child(2) {
            text-align: right;
        }

        .copy-code-button {
            background: var(--bg-tertiary) !important;
            color: var(--accent-light) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 4px;
        }

        .copy-code-button:hover {
            background: var(--bg-hover) !important;
        }
    </style>
</head>
<body>
    <div id="app">Loading...</div>

    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-progress@1/dist/progress.min.js"></script>

    <script>
        window.$docsify = {
            name: 'SailPoint ISC Labs',
            repo: 'TedxHarry/SailPoint_ISC_Labs',
            homepage: 'README.md',
            coverpage: '_coverpage.md',
            onlyCover: false,
            loadSidebar: '_sidebar.md',
            subMaxLevel: 2,
            auto2top: true,
            maxLevel: 4,
            themeColor: '#388bfd',
            search: {
                maxAge: 86400000,
                paths: 'auto',
                placeholder: 'Search documentation...',
                noData: 'No results found.',
                depth: 4,
            },
            plugins: [
                function (hook, vm) {
                    hook.beforeEach(function (html) {
                        return html;
                    });
                }
            ]
        };
    </script>
</body>
</html>
