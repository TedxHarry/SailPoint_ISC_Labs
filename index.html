<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SailPoint ISC Labs - Documentation</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0F172A; --bg2: #1E293B; --accent: #22C55E;
            --accent2: #3B82F6; --accent3: #8B5CF6; --text: #F8FAFC;
            --text2: #CBD5E1; --muted: #94A3B8; --border: rgba(148,163,184,0.1);
        }
        @media (prefers-color-scheme: light) {
            :root {
                --bg: #F8FAFC; --bg2: #F1F5F9; --accent: #16A34A;
                --accent2: #1D4ED8; --accent3: #7C3AED; --text: #0F172A;
                --text2: #334155; --muted: #64748B; --border: rgba(71,85,105,0.1);
            }
        }
        html { scroll-behavior: smooth; }
        body {
            background: linear-gradient(135deg, var(--bg) 0%, #1a1f3a 100%);
            color: var(--text); font-family: 'IBM Plex Sans', sans-serif; line-height: 1.6;
        }
        .progress-bar {
            position: fixed; top: 0; left: 0; height: 3px;
            background: linear-gradient(90deg, var(--accent2), var(--accent), var(--accent3));
            width: 0%; z-index: 1000; transition: width 0.3s;
        }
        nav {
            position: fixed; top: 1rem; left: 1rem; right: 1rem; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px);
            border: 1px solid var(--border); padding: 1rem; border-radius: 12px;
        }
        .nav-title {
            font-size: 0.875rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        button {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: var(--text); padding: 0.5rem 1rem; border-radius: 8px;
            cursor: pointer; font-size: 0.875rem; transition: all 0.2s;
        }
        button:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        main {
            display: grid; grid-template-columns: 250px 1fr 300px;
            gap: 2rem; max-width: 1600px; margin: 0 auto;
            padding: 6rem 2rem 2rem;
        }
        @media (max-width: 1200px) { main { grid-template-columns: 200px 1fr; } }
        @media (max-width: 768px) { main { grid-template-columns: 1fr; } .sidebar, .info-panel { display: none; } }
        .sidebar {
            position: sticky; top: 6rem; height: fit-content;
            max-height: calc(100vh - 8rem); overflow-y: auto;
            background: rgba(30, 41, 59, 0.4); border: 1px solid var(--border);
            border-radius: 12px; padding: 1.5rem; backdrop-filter: blur(10px);
        }
        .sidebar h3 {
            font-size: 0.875rem; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--accent); margin-bottom: 1rem; font-weight: 600;
        }
        .toc-list { list-style: none; }
        .toc-list li { margin-bottom: 0.75rem; }
        .toc-list button {
            width: 100%; text-align: left; background: transparent; border: none;
            color: var(--text2); padding: 0.5rem; border-radius: 4px; cursor: pointer;
            font-size: 0.875rem; border-left: 2px solid transparent; transition: all 0.2s;
        }
        .toc-list button:hover {
            color: var(--accent); border-left-color: var(--accent);
            background: rgba(34, 197, 94, 0.1);
        }
        .toc-list button.active {
            color: var(--accent); border-left-color: var(--accent);
            background: rgba(34, 197, 94, 0.1); font-weight: 600;
        }
        .content { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .breadcrumbs {
            font-size: 0.875rem; color: var(--muted); margin-bottom: 2rem; flex-wrap: wrap;
        }
        h1 {
            font-size: 2.5rem; margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; font-weight: 700;
        }
        h2 {
            font-size: 1.75rem; margin-top: 2rem; margin-bottom: 1rem;
            color: var(--accent); font-weight: 600;
            padding-bottom: 0.75rem; border-bottom: 2px solid var(--border);
        }
        h3 {
            font-size: 1.25rem; margin-top: 1.5rem; margin-bottom: 0.75rem;
            color: var(--accent2); font-weight: 600;
        }
        p { margin-bottom: 1rem; color: var(--text2); line-height: 1.8; }
        a { color: var(--accent2); text-decoration: none; }
        a:hover { color: var(--accent); }
        ul, ol { margin-bottom: 1rem; margin-left: 1.5rem; }
        li { margin-bottom: 0.5rem; color: var(--text2); }
        pre {
            background: rgba(0,0,0,0.3); border: 1px solid var(--border);
            border-radius: 8px; padding: 1.5rem; margin: 1.5rem 0; overflow-x: auto;
        }
        code { font-family: 'JetBrains Mono', monospace; font-size: 0.875rem; }
        pre code { background: none; padding: 0; }
        code:not(pre code) {
            background: rgba(255,255,255,0.1); padding: 0.2rem 0.4rem;
            border-radius: 4px; color: var(--accent2);
        }
        .callout {
            margin: 1.5rem 0; padding: 1.5rem; border-left: 4px solid var(--accent);
            background: rgba(34, 197, 94, 0.1); border-radius: 8px;
        }
        .callout.danger { border-left-color: #EF4444; background: rgba(239,68,68,0.1); }
        .info-panel {
            position: sticky; top: 6rem; height: fit-content;
            background: rgba(30, 41, 59, 0.4); border: 1px solid var(--border);
            border-radius: 12px; padding: 1.5rem; backdrop-filter: blur(10px); font-size: 0.875rem;
        }
        .info-panel h3 {
            font-size: 0.75rem; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--accent); margin-bottom: 1rem;
        }
        .reading-time, .page-stats { color: var(--muted); margin-bottom: 1.5rem; }
        .reading-time strong, .page-stats strong { color: var(--text); }
        .pagination {
            display: flex; justify-content: space-between;
            margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border); gap: 1rem;
        }
        @media (prefers-reduced-motion: reduce) { * { animation-duration: 0.01ms !important; } }
    </style>
</head>
<body>
    <div class="progress-bar"></div>
    <nav>
        <div class="nav-title">📚 SailPoint ISC Labs</div>
        <div>
            <button id="prevBtn" onclick="previousPage()">← Previous</button>
            <button id="nextBtn" onclick="nextPage()">Next →</button>
        </div>
    </nav>

    <main>
        <aside class="sidebar">
            <h3>📖 Contents</h3>
            <ul class="toc-list" id="tocList"></ul>
        </aside>

        <article class="content">
            <div class="breadcrumbs" id="breadcrumbs"></div>
            <div id="contentArea"></div>
            <div class="pagination">
                <div><span id="pageCounter"></span></div>
                <div>
                    <button onclick="previousPage()">← Previous</button>
                    <button onclick="nextPage()">Next →</button>
                </div>
            </div>
        </article>

        <aside class="info-panel">
            <h3>📊 Page Info</h3>
            <div class="reading-time">
                <strong>Reading Time:</strong><br>
                <span id="readingTime">—</span> min
            </div>
            <div class="page-stats">
                <strong>Word Count:</strong><br>
                <span id="wordCount">—</span>
            </div>
        </aside>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        let documents = [];
        let currentPageIndex = 0;

        async function init() {
            try {
                // Fetch file list from GitHub API
                const response = await fetch('https://api.github.com/repos/TedxHarry/SailPoint_ISC_Labs/contents/');
                const files = await response.json();

                // Filter and organize markdown files
                documents = files
                    .filter(f => f.name.endsWith('.md') && !f.name.startsWith('.'))
                    .map(f => ({
                        title: f.name.replace(/\.md$/, '').replace(/-/g, ' '),
                        path: f.download_url,
                        category: 'Docs'
                    }))
                    .sort((a, b) => a.title.localeCompare(b.title));

                if (documents.length === 0) {
                    showError('No markdown files found');
                    return;
                }

                renderTOC();
                await loadPage(0);
                setupProgressBar();
            } catch (err) {
                showError('Error loading files: ' + err.message);
            }
        }

        function renderTOC() {
            const tocList = document.getElementById('tocList');
            tocList.innerHTML = '';
            documents.forEach((doc, i) => {
                const li = document.createElement('li');
                const btn = document.createElement('button');
                btn.textContent = doc.title;
                btn.onclick = () => loadPage(i);
                li.appendChild(btn);
                tocList.appendChild(li);
            });
            updateActiveTOC();
        }

        function updateActiveTOC() {
            document.querySelectorAll('.toc-list button').forEach((btn, i) => {
                btn.classList.toggle('active', i === currentPageIndex);
            });
        }

        async function loadPage(index) {
            if (index < 0 || index >= documents.length) return;
            currentPageIndex = index;
            const doc = documents[index];

            document.getElementById('breadcrumbs').textContent = `📚 ${doc.category} > ${doc.title}`;
            document.getElementById('contentArea').innerHTML = '<p style="color: var(--muted); padding: 2rem;">⏳ Loading...</p>';

            try {
                const response = await fetch(doc.path);
                const markdown = await response.text();
                const html = marked.parse(markdown);
                document.getElementById('contentArea').innerHTML = html;

                document.querySelectorAll('pre code').forEach(block => {
                    hljs.highlightElement(block);
                });

                const words = markdown.split(/\s+/).length;
                const readingTime = Math.ceil(words / 200);
                document.getElementById('wordCount').textContent = words.toLocaleString();
                document.getElementById('readingTime').textContent = readingTime;
            } catch (err) {
                document.getElementById('contentArea').innerHTML = `
                    <div class="callout danger">
                        <strong>Error Loading:</strong> ${err.message}
                    </div>
                `;
            }

            updateActiveTOC();
            document.getElementById('prevBtn').disabled = currentPageIndex === 0;
            document.getElementById('nextBtn').disabled = currentPageIndex === documents.length - 1;
            document.getElementById('pageCounter').textContent = `Page ${currentPageIndex + 1} of ${documents.length}`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function nextPage() { currentPageIndex < documents.length - 1 && loadPage(currentPageIndex + 1); }
        function previousPage() { currentPageIndex > 0 && loadPage(currentPageIndex - 1); }

        function setupProgressBar() {
            window.addEventListener('scroll', () => {
                const h = document.documentElement.scrollHeight - window.innerHeight;
                const p = window.scrollY / h * 100;
                document.querySelector('.progress-bar').style.width = p + '%';
            });
        }

        function showError(msg) {
            document.getElementById('contentArea').innerHTML = `
                <div class="callout danger"><strong>Error:</strong> ${msg}</div>
            `;
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') nextPage();
            if (e.key === 'ArrowLeft') previousPage();
        });

        init();
    </script>
</body>
</html>
